<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantaba AI — Socratic Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- marked.js for markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<style>
/* ═══════════════════════════════════
   TOKENS
═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --void:    #010810;
  --deep:    #030f1c;
  --surface: #061524;
  --panel:   #081d2e;
  --lift:    #0a2236;
  --cyan:    #00e5ff;
  --cyan-bg: rgba(0,229,255,0.07);
  --orange:  #ff6b00;
  --org-bg:  rgba(255,107,0,0.1);
  --white:   #f0f8ff;
  --text:    #c8dff0;
  --muted:   #7a9bb5;
  --border:  rgba(0,229,255,0.1);
  --border2: rgba(0,229,255,0.2);
}

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  cursor: none;
}

/* subtle grid */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.3;
}

/* neural canvas */
#nc { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; }

/* ═══════════════════════════════════
   CURSOR
═══════════════════════════════════ */
.c-dot {
  position: fixed; width: 7px; height: 7px;
  background: var(--cyan); border-radius: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none; z-index: 9999;
  box-shadow: 0 0 8px var(--cyan);
  transition: transform 0.12s;
}
.c-ring {
  position: fixed; width: 32px; height: 32px;
  border: 1px solid rgba(0,229,255,0.45); border-radius: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none; z-index: 9998;
  transition: width 0.2s, height 0.2s;
}

/* ═══════════════════════════════════
   LAYOUT
═══════════════════════════════════ */
.app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; max-width: 1100px;
  margin: 0 auto; width: 100%;
}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.8rem;
  background: rgba(1,8,16,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-logo {
  display: flex; align-items: center; gap: 0.7rem;
  font-family: 'Orbitron', monospace; font-weight: 700;
  font-size: 0.9rem; letter-spacing: 0.12em; color: var(--white);
  text-decoration: none;
}
.logo-orb {
  width: 28px; height: 28px; border-radius: 50%;
  background: conic-gradient(from 0deg, var(--cyan), var(--orange), var(--cyan));
  animation: spin 10s linear infinite;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; font-weight: 900; color: #000; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.header-status {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.status-dot {
  width: 6px; height: 6px; background: #28c840; border-radius: 50%;
  box-shadow: 0 0 6px #28c840; animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.header-right { display: flex; align-items: center; gap: 1.2rem; }
.header-btn {
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.45rem 1.1rem; text-decoration: none;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  transition: all 0.2s; cursor: none;
}
.btn-ghost {
  color: var(--muted); border: 1px solid var(--border); background: transparent;
}
.btn-ghost:hover { color: var(--cyan); border-color: var(--border2); }
.btn-cta { color: #000; background: var(--cyan); border: none; }
.btn-cta:hover { background: var(--orange); }

/* ═══════════════════════════════════
   CHAT AREA
═══════════════════════════════════ */
.chat-area {
  flex: 1; overflow-y: auto; padding: 2rem 1.8rem;
  display: flex; flex-direction: column; gap: 1.5rem;
  scroll-behavior: smooth;
}

/* custom scrollbar */
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Welcome screen ── */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; text-align: center;
  padding: 3rem 2rem; gap: 1.5rem;
  animation: fadeUp 0.6s forwards;
}
.welcome-orb {
  width: 80px; height: 80px; border-radius: 50%;
  background: conic-gradient(from 0deg, var(--cyan), var(--orange), var(--cyan));
  animation: spin 8s linear infinite;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', monospace; font-size: 1.4rem;
  font-weight: 900; color: #000;
  box-shadow: 0 0 40px rgba(0,229,255,0.2);
}
.welcome-title {
  font-family: 'Orbitron', monospace; font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 900; letter-spacing: -0.02em; color: var(--white); line-height: 1.1;
}
.welcome-title em {
  font-style: normal;
  background: linear-gradient(90deg, var(--cyan), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome-desc {
  font-size: 0.95rem; line-height: 1.8; color: var(--text); max-width: 480px;
}
.welcome-chips {
  display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; margin-top: 0.5rem;
}
.chip {
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  letter-spacing: 0.06em; padding: 0.55rem 1rem;
  background: var(--cyan-bg); border: 1px solid var(--border2);
  color: var(--cyan); cursor: none; transition: all 0.2s;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.chip:hover {
  background: rgba(0,229,255,0.15); border-color: var(--cyan);
  transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,229,255,0.15);
}

/* ── Messages ── */
.msg-row {
  display: flex; gap: 0.9rem; align-items: flex-start;
  animation: fadeUp 0.35s forwards;
}
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; font-family: 'Orbitron', monospace;
  margin-top: 2px;
}
.avatar-ai {
  background: conic-gradient(var(--cyan), var(--orange), var(--cyan));
  color: #000; animation: spin 10s linear infinite;
  box-shadow: 0 0 12px rgba(0,229,255,0.3);
}
.avatar-user {
  background: var(--org-bg); border: 1px solid rgba(255,107,0,0.3);
  color: var(--orange);
}

.msg-bubble {
  max-width: 88%; padding: 1rem 1.2rem;
  font-size: 0.92rem; line-height: 1.75;
  position: relative;
}

/* AI bubble */
.bubble-ai {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  clip-path: polygon(0 0,100% 0,100% 100%,10px 100%,0 calc(100% - 10px));
}
.bubble-ai::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--cyan), transparent);
}

/* User bubble */
.bubble-user {
  background: var(--org-bg);
  border: 1px solid rgba(255,107,0,0.25);
  color: #ffd8b0;
  clip-path: polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);
  font-family: 'Syne', sans-serif;
}

/* ── MARKDOWN STYLES inside ai bubble ── */
.bubble-ai h1,.bubble-ai h2,.bubble-ai h3 {
  font-family: 'Orbitron', monospace; font-weight: 700;
  color: var(--white); margin: 1rem 0 0.6rem; line-height: 1.2;
  letter-spacing: -0.01em;
}
.bubble-ai h1 { font-size: 1.1rem; }
.bubble-ai h2 { font-size: 1rem; color: var(--cyan); }
.bubble-ai h3 { font-size: 0.9rem; color: var(--orange); }

.bubble-ai p { margin-bottom: 0.7rem; color: var(--text); }
.bubble-ai p:last-child { margin-bottom: 0; }

.bubble-ai strong { color: var(--white); font-weight: 700; }
.bubble-ai em { color: var(--cyan); font-style: italic; }

.bubble-ai ul, .bubble-ai ol {
  padding-left: 1.3rem; margin: 0.6rem 0;
  display: flex; flex-direction: column; gap: 0.4rem;
}
.bubble-ai li { color: var(--text); font-size: 0.9rem; line-height: 1.65; }
.bubble-ai li::marker { color: var(--cyan); }

.bubble-ai blockquote {
  border-left: 2px solid var(--cyan);
  padding: 0.5rem 1rem; margin: 0.8rem 0;
  background: var(--cyan-bg);
  color: var(--text); font-style: italic;
}

/* inline code */
.bubble-ai code {
  font-family: 'Space Mono', monospace; font-size: 0.82rem;
  background: rgba(0,229,255,0.08); border: 1px solid var(--border);
  padding: 0.15rem 0.45rem; border-radius: 2px; color: var(--cyan);
}

/* code blocks */
.bubble-ai pre {
  background: var(--void); border: 1px solid var(--border2);
  border-radius: 2px; padding: 1.1rem 1.2rem; margin: 0.8rem 0;
  overflow-x: auto; position: relative;
}
.bubble-ai pre::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--cyan), var(--orange), transparent);
}
.bubble-ai pre code {
  background: none; border: none; padding: 0;
  font-size: 0.8rem; color: #b0d4e8; line-height: 1.7;
}

.bubble-ai table {
  width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.85rem;
}
.bubble-ai th {
  background: var(--cyan-bg); border: 1px solid var(--border2);
  padding: 0.6rem 0.9rem; text-align: left;
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--cyan);
}
.bubble-ai td {
  border: 1px solid var(--border); padding: 0.6rem 0.9rem; color: var(--text);
}
.bubble-ai tr:hover td { background: rgba(0,229,255,0.03); }

.bubble-ai a { color: var(--cyan); text-decoration: underline; }
.bubble-ai hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

/* ── Thinking indicator ── */
.thinking {
  display: flex; gap: 0.9rem; align-items: flex-start;
  animation: fadeUp 0.35s forwards;
}
.thinking-bubble {
  background: var(--surface); border: 1px solid var(--border2);
  padding: 1rem 1.4rem;
  clip-path: polygon(0 0,100% 0,100% 100%,10px 100%,0 calc(100% - 10px));
  display: flex; align-items: center; gap: 0.8rem;
}
.think-label {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.think-dots { display: flex; gap: 5px; align-items: center; }
.think-dot {
  width: 6px; height: 6px; background: var(--cyan); border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.think-dot:nth-child(2) { animation-delay: 0.2s; }
.think-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* error bubble */
.bubble-error {
  background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.25);
  color: #ffb0b0; padding: 0.9rem 1.2rem; font-size: 0.87rem; font-family: 'Space Mono', monospace;
}

/* ── msg meta ── */
.msg-meta {
  font-family: 'Space Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.06em; color: var(--muted); margin-top: 0.5rem;
  text-align: right;
}
.msg-row.user .msg-meta { text-align: right; }

/* ═══════════════════════════════════
   INPUT AREA
═══════════════════════════════════ */
.input-wrap {
  flex-shrink: 0; padding: 1.2rem 1.8rem 1.5rem;
  background: rgba(1,8,16,0.9);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
}

.input-box {
  display: flex; align-items: flex-end; gap: 0.8rem;
  background: var(--surface); border: 1px solid var(--border2);
  padding: 0.8rem 0.8rem 0.8rem 1.2rem;
  transition: border-color 0.2s;
  clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.input-box:focus-within { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,229,255,0.08); }

#user-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white); font-family: 'Syne', sans-serif;
  font-size: 0.93rem; line-height: 1.6; resize: none;
  max-height: 140px; min-height: 24px;
  cursor: none;
}
#user-input::placeholder { color: var(--muted); }
#user-input::-webkit-scrollbar { width: 3px; }
#user-input::-webkit-scrollbar-thumb { background: var(--border2); }

.send-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--cyan); border: none; cursor: none;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
  clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.send-btn:hover:not(:disabled) { background: var(--orange); transform: scale(1.05); }
.send-btn:disabled { background: var(--border); opacity: 0.5; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: #000; }

.input-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.7rem;
}
.input-hint {
  font-family: 'Space Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.08em; color: var(--muted);
}
.input-hint kbd {
  background: var(--panel); border: 1px solid var(--border);
  padding: 0.1rem 0.35rem; font-size: 0.55rem; color: var(--muted);
}
.session-info {
  font-family: 'Space Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.06em; color: var(--muted);
  display: flex; align-items: center; gap: 0.5rem;
}
.session-dot { width: 5px; height: 5px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 4px var(--cyan); }

/* ── Mode toggle ── */
.mode-bar {
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem;
}
.mode-btn {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: none;
  padding: 0.35rem 0.9rem; border: 1px solid var(--border); background: transparent;
  color: var(--muted); transition: all 0.2s;
  clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.mode-btn.active { background: var(--cyan-bg); border-color: var(--cyan); color: var(--cyan); }
.mode-btn:hover { border-color: var(--border2); color: var(--text); }
.clear-btn {
  margin-left: auto; font-family: 'Space Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: none;
  padding: 0.35rem 0.9rem; border: 1px solid var(--border); background: transparent;
  color: var(--muted); transition: all 0.2s;
  clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.clear-btn:hover { border-color: rgba(255,107,0,0.4); color: var(--orange); }

/* ═══════════════════════════════════
   ANIMATIONS
═══════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ═══════════════════════════════════
   RESPONSIVE
═══════════════════════════════════ */
@media (max-width: 600px) {
  .header { padding: 0.9rem 1.1rem; }
  .chat-area { padding: 1.2rem 1rem; }
  .input-wrap { padding: 1rem 1rem 1.2rem; }
  .header-btn { display: none; }
  .msg-bubble { max-width: 90%; }
  .welcome-title { font-size: 1.3rem; }
}
</style>
</head>
<body>

<canvas id="nc"></canvas>
<div class="c-dot" id="cdot"></div>
<div class="c-ring" id="cring"></div>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <a href="/" class="header-logo">
      <img src="/logo.png" alt="Bantaba AI" style="height:28px;width:28px;object-fit:contain;border-radius:6px;">
      Bantaba AI
    </a>
    <div class="header-status">
      <span class="status-dot"></span>
      Online · Socratic Mode
    </div>
    <div class="header-right">
      <a href="https://github.com/O-keita/socratic_ai_tutor" target="_blank" class="header-btn btn-ghost">GitHub</a>
      <a href="/" class="header-btn btn-cta">← Home</a>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <img src="/logo.png" alt="Bantaba AI" style="width:80px;height:80px;object-fit:contain;border-radius:50%;box-shadow:0 0 40px rgba(0,229,255,0.2);">
      <h1 class="welcome-title">The AI that<br><em>asks instead of telling.</em></h1>
      <p class="welcome-desc">
        Ask me anything about Data Science or Machine Learning. I won't give you the answer — I'll ask the question that helps you find it yourself.
      </p>
      <div class="welcome-chips">
        <button class="chip" onclick="sendChip(this)">What is gradient descent?</button>
        <button class="chip" onclick="sendChip(this)">Explain overfitting</button>
        <button class="chip" onclick="sendChip(this)">How do neural networks learn?</button>
        <button class="chip" onclick="sendChip(this)">What is a confusion matrix?</button>
        <button class="chip" onclick="sendChip(this)">Explain bias vs variance</button>
        <button class="chip" onclick="sendChip(this)">What is feature engineering?</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="mode-bar">
      <button class="mode-btn active" onclick="setMode('socratic', this)">Socratic</button>
      <button class="mode-btn" onclick="setMode('explain', this)">Explain</button>
      <button class="mode-btn" onclick="setMode('quiz', this)">Quiz me</button>
      <button class="clear-btn" onclick="clearChat()">✕ Clear</button>
    </div>
    <div class="input-box">
      <textarea
        id="user-input"
        placeholder="Ask about Data Science or Machine Learning..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint"><kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
      <span class="session-info"><span class="session-dot"></span> Session active</span>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
const API_URL = '/chat/public';
const SESSION_ID = 'web_' + Math.random().toString(36).slice(2, 10);
const USER_ID    = 'user_' + Math.random().toString(36).slice(2, 8);

let currentMode = 'socratic';
let isThinking  = false;
let msgCount    = 0;
let conversationHistory = []; // context memory — persists across turns

/* ══════════════════════════════════
   MARKED CONFIG
══════════════════════════════════ */
marked.setOptions({
  breaks: true,
  gfm: true,
  headerIds: false,
  mangle: false
});

/* ══════════════════════════════════
   NEURAL CANVAS
══════════════════════════════════ */
const canvas = document.getElementById('nc');
const ctx    = canvas.getContext('2d');
let W, H, nodes = [], mouse = { x: -999, y: -999 };

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initNodes() {
  nodes = [];
  for (let i = 0; i < 60; i++) nodes.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
    r: Math.random()*1.5+.4, p: Math.random()*Math.PI*2
  });
}
function drawCanvas() {
  ctx.clearRect(0,0,W,H);
  const all = [...nodes, {x:mouse.x,y:mouse.y,r:0,isM:true}];
  for (let i=0;i<all.length;i++) {
    for (let j=i+1;j<all.length;j++) {
      const dx=all[i].x-all[j].x, dy=all[i].y-all[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      const md=(all[i].isM||all[j].isM)?180:110;
      if (d<md) {
        const a=(1-d/md)*.45;
        const g=ctx.createLinearGradient(all[i].x,all[i].y,all[j].x,all[j].y);
        g.addColorStop(0,`rgba(0,229,255,${a})`);
        g.addColorStop(1,`rgba(0,200,220,${a*.1})`);
        ctx.beginPath();ctx.strokeStyle=g;ctx.lineWidth=.5;
        ctx.moveTo(all[i].x,all[i].y);ctx.lineTo(all[j].x,all[j].y);ctx.stroke();
      }
    }
  }
  nodes.forEach(n => {
    n.p += .016;
    const glow = Math.sin(n.p)*.45+.55;
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
    g.addColorStop(0,`rgba(0,229,255,${glow*.6})`);
    g.addColorStop(1,'rgba(0,229,255,0)');
    ctx.beginPath();ctx.fillStyle=g;ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.fillStyle=`rgba(0,229,255,${glow})`;ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
  });
  requestAnimationFrame(drawCanvas);
}
resize();initNodes();drawCanvas();
window.addEventListener('resize',()=>{resize();initNodes()});
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function timestamp() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function scrollBottom() {
  const area = document.getElementById('chat-area');
  setTimeout(() => area.scrollTo({top: area.scrollHeight, behavior: 'smooth'}), 50);
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) { w.style.animation = 'fadeOut 0.3s forwards'; setTimeout(()=>w.remove(),300); }
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function clearChat() {
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  msgCount = 0;
  conversationHistory = []; // reset context memory
  // Re-insert welcome
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.id = 'welcome';
  welcome.innerHTML = `
    <img src="/logo.png" alt="Bantaba AI" style="width:80px;height:80px;object-fit:contain;border-radius:50%;box-shadow:0 0 40px rgba(0,229,255,0.2);">
    <h1 class="welcome-title">The AI that<br><em>asks instead of telling.</em></h1>
    <p class="welcome-desc">Ask me anything about Data Science or Machine Learning. I won't give you the answer — I'll ask the question that helps you find it yourself.</p>
    <div class="welcome-chips">
      <button class="chip" onclick="sendChip(this)">What is gradient descent?</button>
      <button class="chip" onclick="sendChip(this)">Explain overfitting</button>
      <button class="chip" onclick="sendChip(this)">How do neural networks learn?</button>
      <button class="chip" onclick="sendChip(this)">What is a confusion matrix?</button>
      <button class="chip" onclick="sendChip(this)">Explain bias vs variance</button>
      <button class="chip" onclick="sendChip(this)">What is feature engineering?</button>
    </div>`;
  area.appendChild(welcome);
}

/* ══════════════════════════════════
   RENDER MESSAGE
══════════════════════════════════ */
function appendUserMsg(text) {
  hideWelcome();
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div>
      <div class="msg-bubble bubble-user">${escapeHtml(text)}</div>
      <div class="msg-meta">${timestamp()}</div>
    </div>
    <div class="msg-avatar avatar-user">U</div>
  `;
  area.appendChild(row);
  scrollBottom();
}

function appendAIMsg(text) {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row';

  // Parse markdown
  const rendered = marked.parse(text);

  row.innerHTML = `
    <div class="msg-avatar avatar-ai">B</div>
    <div>
      <div class="msg-bubble bubble-ai">${rendered}</div>
      <div class="msg-meta">${timestamp()} · Socratic AI</div>
    </div>
  `;
  area.appendChild(row);
  scrollBottom();
}

function appendError(msg) {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar avatar-ai">B</div>
    <div class="bubble-error">⚠ ${msg}</div>
  `;
  area.appendChild(row);
  scrollBottom();
}

function showThinking() {
  hideWelcome();
  const area = document.getElementById('chat-area');
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinking-indicator';
  el.innerHTML = `
    <div class="msg-avatar avatar-ai">B</div>
    <div class="thinking-bubble">
      <span class="think-label">Reasoning</span>
      <div class="think-dots">
        <div class="think-dot"></div>
        <div class="think-dot"></div>
        <div class="think-dot"></div>
      </div>
    </div>
  `;
  area.appendChild(el);
  scrollBottom();
}

function hideThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════
   SEND MESSAGE
══════════════════════════════════ */
async function sendMessage(overrideText) {
  if (isThinking) return;

  const input = document.getElementById('user-input');
  const rawText = overrideText || input.value.trim();
  if (!rawText) return;

  // Build message with mode prefix if not socratic
  let messageText = rawText;
  if (currentMode === 'explain') messageText = `[EXPLAIN MODE] ${rawText}`;
  if (currentMode === 'quiz')    messageText = `[QUIZ MODE] Please quiz me on: ${rawText}`;

  // Clear input
  if (!overrideText) {
    input.value = '';
    input.style.height = 'auto';
  }

  // UI
  appendUserMsg(rawText);
  isThinking = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();

  // Add user turn to history before sending
  conversationHistory.push({ role: 'user', content: messageText });

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: messageText,
        history: conversationHistory.slice(0, -1) // send all previous turns
      })
    });

    hideThinking();

    if (!response.ok) {
      conversationHistory.pop(); // revert on failure
      throw new Error(`Server returned ${response.status}`);
    }

    const data = await response.json();

    const reply =
      data.response ||
      data.message  ||
      data.reply    ||
      data.content  ||
      data.text     ||
      (typeof data === 'string' ? data : null);

    if (reply) {
      appendAIMsg(reply);
      // Store assistant response in history for context memory
      conversationHistory.push({ role: 'assistant', content: reply });
    } else {
      conversationHistory.pop();
      appendError('Received an unexpected response format from the server.');
      console.warn('Unexpected response:', data);
    }

  } catch (err) {
    hideThinking();
    if (err.name === 'TypeError' && err.message.includes('fetch')) {
      appendError('Could not reach the server. Please check your connection or try the offline APK.');
    } else {
      appendError(`Something went wrong: ${err.message}`);
    }
    console.error(err);
  } finally {
    isThinking = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
    msgCount++;
  }
}

function sendChip(btn) {
  sendMessage(btn.textContent);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
