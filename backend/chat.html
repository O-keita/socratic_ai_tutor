<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantaba AI — Socratic Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --bg:       #0d0d0d;
  --surface:  #161616;
  --card:     #1c1c1c;
  --border:   #2a2a2a;
  --border-hi:#3a3a3a;
  --orange:   #f97316;
  --orange-d: #c2590f;
  --cyan:     #22d3ee;
  --text:     #e5e5e5;
  --muted:    #737373;
  --white:    #fafafa;
  --user-bg:  #1a120a;
  --user-bdr: #7c3400;
  --ai-bg:    #0f1923;
  --ai-bdr:   #1e3a5f;
  --green:    #22c55e;
  --r:        14px;
  --r-sm:     8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
.brand img { width: 30px; height: 30px; border-radius: 8px; object-fit: contain; }
.brand-name { font-size: 0.9rem; font-weight: 600; color: var(--white); letter-spacing: -0.01em; }
.status-pill {
  display: flex; align-items: center; gap: 0.45rem;
  font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace;
}
.sdot {
  width: 7px; height: 7px; background: var(--green); border-radius: 50%;
  box-shadow: 0 0 6px var(--green); animation: blink 2.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }
.hactions { display: flex; align-items: center; gap: 0.5rem; }
.hbtn {
  font-size: 0.78rem; font-weight: 500; padding: 0.38rem 0.9rem;
  border-radius: var(--r-sm); text-decoration: none;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
}
.hbtn:hover { color: var(--text); border-color: var(--border-hi); }
.hbtn-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
.hbtn-primary:hover { background: var(--orange-d); border-color: var(--orange-d); }

/* MESSAGES */
.messages {
  flex: 1; overflow-y: auto;
  padding: 2rem 1rem; scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-wrap {
  max-width: 740px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 1.6rem;
}

/* WELCOME */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: 3.5rem 1rem 1rem; gap: 1rem;
  animation: up .5s forwards;
}
.w-logo {
  width: 68px; height: 68px; border-radius: 18px;
  object-fit: contain; background: #111; padding: 8px;
  box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(249,115,22,.15);
}
.welcome h1 {
  font-size: 1.55rem; font-weight: 600; color: var(--white);
  line-height: 1.3; letter-spacing: -.02em;
}
.welcome h1 span {
  background: linear-gradient(90deg, var(--orange), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome p { font-size: .9rem; color: var(--muted); max-width: 400px; line-height: 1.7; }
.chips { display: flex; flex-wrap: wrap; gap: .45rem; justify-content: center; margin-top: .5rem; }
.chip {
  font-size: .78rem; padding: .42rem .9rem;
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  border-radius: 100px; cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
}
.chip:hover { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,.06); }

/* MESSAGE ROW */
.row {
  display: flex; gap: .7rem; align-items: flex-start;
  animation: up .28s forwards;
}
.row.user { flex-direction: row-reverse; }

.av {
  width: 34px; height: 34px; border-radius: 10px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  margin-top: 2px; overflow: hidden;
}
.av-ai { background: #0a0f15; border: 1px solid var(--ai-bdr); }
.av-ai img { width: 100%; height: 100%; object-fit: contain; padding: 5px; }
.av-user {
  background: var(--user-bg); border: 1px solid var(--user-bdr);
  color: var(--orange); font-size: .75rem; font-weight: 600;
}

.mbody { display: flex; flex-direction: column; gap: .28rem; max-width: calc(100% - 44px); }
.row.user .mbody { align-items: flex-end; }

.bubble {
  padding: .82rem 1.05rem; border-radius: var(--r);
  font-size: .9rem; line-height: 1.75; word-break: break-word;
}
.bubble-ai {
  background: var(--ai-bg); border: 1px solid var(--ai-bdr);
  color: var(--text); border-top-left-radius: 4px;
}
.bubble-user {
  background: var(--user-bg); border: 1px solid var(--user-bdr);
  color: #fde8d0; border-top-right-radius: 4px; max-width: 480px;
}
.meta { font-size: .67rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; padding: 0 .2rem; }

/* MARKDOWN */
.bubble-ai p { margin-bottom: .6rem; }
.bubble-ai p:last-child { margin-bottom: 0; }
.bubble-ai strong { color: var(--white); }
.bubble-ai em { color: var(--cyan); font-style: italic; }
.bubble-ai h1,.bubble-ai h2,.bubble-ai h3 { color: var(--white); margin: .8rem 0 .4rem; font-weight: 600; }
.bubble-ai h1 { font-size: 1rem; }
.bubble-ai h2 { font-size: .92rem; color: var(--cyan); }
.bubble-ai h3 { font-size: .87rem; color: var(--orange); }
.bubble-ai ul,.bubble-ai ol { padding-left: 1.2rem; margin: .5rem 0; display: flex; flex-direction: column; gap: .3rem; }
.bubble-ai li { font-size: .88rem; }
.bubble-ai li::marker { color: var(--orange); }
.bubble-ai code {
  font-family: 'JetBrains Mono', monospace; font-size: .8rem;
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  padding: .1rem .4rem; border-radius: 4px; color: var(--cyan);
}
.bubble-ai pre {
  background: #080808; border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: .9rem 1rem; margin: .6rem 0;
  overflow-x: auto; position: relative;
}
.bubble-ai pre::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--orange), var(--cyan), transparent);
}
.bubble-ai pre code { background: none; border: none; padding: 0; color: #9dc8e8; font-size: .8rem; }
.bubble-ai blockquote {
  border-left: 3px solid var(--orange); padding: .4rem .9rem; margin: .6rem 0;
  background: rgba(249,115,22,.05); color: var(--muted); font-style: italic;
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
}
.bubble-ai table { width: 100%; border-collapse: collapse; margin: .6rem 0; font-size: .83rem; }
.bubble-ai th {
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  padding: .45rem .8rem; text-align: left;
  font-family: 'JetBrains Mono', monospace; font-size: .7rem;
  letter-spacing: .05em; color: var(--cyan); text-transform: uppercase;
}
.bubble-ai td { border: 1px solid var(--border); padding: .45rem .8rem; }
.bubble-ai a { color: var(--cyan); }
.bubble-ai hr { border: none; border-top: 1px solid var(--border); margin: .8rem 0; }

/* THINKING */
.thinking-row { display: flex; align-items: center; gap: .7rem; animation: up .28s forwards; }
.thinking-bubble {
  display: flex; align-items: center; gap: .65rem;
  background: var(--ai-bg); border: 1px solid var(--ai-bdr);
  border-radius: var(--r); border-top-left-radius: 4px;
  padding: .7rem 1rem;
}
.tlabel { font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.tdots { display: flex; gap: 4px; }
.td {
  width: 5px; height: 5px; background: var(--cyan); border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.35} 40%{transform:translateY(-5px);opacity:1} }

/* ERROR */
.err-bubble {
  background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
  color: #fca5a5; font-size: .84rem; padding: .75rem 1rem;
  border-radius: var(--r); font-family: 'JetBrains Mono', monospace;
}

/* INPUT */
.input-zone {
  flex-shrink: 0; padding: .7rem 1rem 1rem;
  background: var(--surface); border-top: 1px solid var(--border);
}
.input-inner { max-width: 740px; margin: 0 auto; }
.mode-row { display: flex; align-items: center; gap: .4rem; margin-bottom: .55rem; }
.mbtn {
  font-size: .72rem; font-weight: 500; padding: .3rem .8rem;
  border-radius: 100px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.mbtn.active { background: rgba(249,115,22,.1); border-color: rgba(249,115,22,.4); color: var(--orange); }
.mbtn:hover:not(.active) { color: var(--text); border-color: var(--border-hi); }
.clrbtn {
  margin-left: auto; font-size: .72rem; padding: .3rem .8rem;
  border-radius: 100px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.clrbtn:hover { color: #ef4444; border-color: rgba(239,68,68,.4); }
.ibox {
  display: flex; align-items: flex-end; gap: .55rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: .6rem .6rem .6rem 1rem;
  transition: border-color .15s, box-shadow .15s;
}
.ibox:focus-within {
  border-color: rgba(249,115,22,.45);
  box-shadow: 0 0 0 3px rgba(249,115,22,.05);
}
#inp {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white); font-family: 'Inter', sans-serif;
  font-size: .92rem; line-height: 1.6; resize: none;
  max-height: 140px; min-height: 22px;
}
#inp::placeholder { color: var(--muted); }
#inp::-webkit-scrollbar { width: 3px; }
#inp::-webkit-scrollbar-thumb { background: var(--border); }
.sbtn {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--orange); border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.sbtn:hover:not(:disabled) { background: var(--orange-d); transform: scale(1.05); }
.sbtn:disabled { background: var(--border); opacity: .5; cursor: not-allowed; }
.sbtn svg { width: 15px; height: 15px; fill: #fff; }
.hint {
  margin-top: .45rem; display: flex; justify-content: space-between; align-items: center;
  font-size: .68rem; color: var(--muted); font-family: 'JetBrains Mono', monospace;
}
.hint kbd {
  background: var(--card); border: 1px solid var(--border);
  padding: .1rem .3rem; border-radius: 4px; font-size: .62rem;
}
.sdot2 {
  display: inline-block; width: 5px; height: 5px; background: var(--green);
  border-radius: 50%; box-shadow: 0 0 4px var(--green); margin-right: 4px;
}

@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

@media(max-width:600px){
  .header{padding:0 1rem;} .messages{padding:1.2rem .75rem;}
  .input-zone{padding:.6rem .75rem .9rem;} .hbtn{display:none;} .status-pill{display:none;}
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="brand">
    <img src="/logo.png" alt="Bantaba AI">
    <span class="brand-name">Bantaba AI</span>
  </a>
  <div class="status-pill">
    <span class="sdot"></span>
    Online &nbsp;·&nbsp; Socratic Mode
  </div>
  <div class="hactions">
    <a href="https://github.com/O-keita/socratic_ai_tutor" target="_blank" class="hbtn">GitHub</a>
    <a href="/" class="hbtn hbtn-primary">← Home</a>
  </div>
</header>

<div class="messages" id="messages">
  <div class="msg-wrap" id="wrap">
    <div class="welcome" id="welcome">
      <img src="/logo.png" alt="Bantaba AI" class="w-logo">
      <h1>The AI that <span>asks instead of telling.</span></h1>
      <p>Ask me anything about Data Science or Machine Learning. I won't give you the answer — I'll ask the question that leads you there yourself.</p>
      <div class="chips">
        <button class="chip" onclick="sendChip(this)">What is gradient descent?</button>
        <button class="chip" onclick="sendChip(this)">Explain overfitting</button>
        <button class="chip" onclick="sendChip(this)">How do neural networks learn?</button>
        <button class="chip" onclick="sendChip(this)">What is a confusion matrix?</button>
        <button class="chip" onclick="sendChip(this)">Explain bias vs variance</button>
        <button class="chip" onclick="sendChip(this)">What is feature engineering?</button>
      </div>
    </div>
  </div>
</div>

<div class="input-zone">
  <div class="input-inner">
    <div class="mode-row">
      <button class="mbtn active" onclick="setMode('socratic',this)">Socratic</button>
      <button class="mbtn" onclick="setMode('explain',this)">Explain</button>
      <button class="mbtn" onclick="setMode('quiz',this)">Quiz me</button>
      <button class="clrbtn" onclick="clearChat()">Clear</button>
    </div>
    <div class="ibox">
      <textarea id="inp" placeholder="Ask about Data Science or Machine Learning..."
        rows="1" onkeydown="handleKey(event)" oninput="grow(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">
      <span><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> new line</span>
      <span><span class="sdot2"></span>Session active</span>
    </div>
  </div>
</div>

<script>
const API = '/chat/public';
let mode    = 'socratic';
let busy    = false;
let history = [];

marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

const wrap = () => document.getElementById('wrap');
const msgs = () => document.getElementById('messages');

function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function grow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function scroll() { setTimeout(()=>msgs().scrollTo({top:msgs().scrollHeight,behavior:'smooth'}),50); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function clearChat() {
  history = [];
  wrap().innerHTML = `
    <div class="welcome" id="welcome">
      <img src="/logo.png" alt="Bantaba AI" class="w-logo">
      <h1>The AI that <span>asks instead of telling.</span></h1>
      <p>Ask me anything about Data Science or Machine Learning. I won't give you the answer — I'll ask the question that leads you there yourself.</p>
      <div class="chips">
        <button class="chip" onclick="sendChip(this)">What is gradient descent?</button>
        <button class="chip" onclick="sendChip(this)">Explain overfitting</button>
        <button class="chip" onclick="sendChip(this)">How do neural networks learn?</button>
        <button class="chip" onclick="sendChip(this)">What is a confusion matrix?</button>
        <button class="chip" onclick="sendChip(this)">Explain bias vs variance</button>
        <button class="chip" onclick="sendChip(this)">What is feature engineering?</button>
      </div>
    </div>`;
}

function addUser(text) {
  hideWelcome();
  const el = document.createElement('div');
  el.className = 'row user';
  el.innerHTML = `
    <div class="mbody">
      <div class="bubble bubble-user">${esc(text)}</div>
      <div class="meta">${ts()}</div>
    </div>
    <div class="av av-user">U</div>`;
  wrap().appendChild(el); scroll();
}

function addAI(text) {
  const el = document.createElement('div');
  el.className = 'row';
  el.innerHTML = `
    <div class="av av-ai"><img src="/logo.png" alt="B"></div>
    <div class="mbody">
      <div class="bubble bubble-ai">${marked.parse(text)}</div>
      <div class="meta">${ts()} · Bantaba AI</div>
    </div>`;
  wrap().appendChild(el); scroll();
}

function addError(msg) {
  const el = document.createElement('div');
  el.className = 'row';
  el.innerHTML = `
    <div class="av av-ai"><img src="/logo.png" alt="B"></div>
    <div class="err-bubble">⚠ ${msg}</div>`;
  wrap().appendChild(el); scroll();
}

function showThinking() {
  hideWelcome();
  const el = document.createElement('div');
  el.className = 'thinking-row'; el.id = 'thinking';
  el.innerHTML = `
    <div class="av av-ai"><img src="/logo.png" alt="B"></div>
    <div class="thinking-bubble">
      <span class="tlabel">Thinking</span>
      <div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
    </div>`;
  wrap().appendChild(el); scroll();
}
function hideThinking() { const e=document.getElementById('thinking'); if(e) e.remove(); }

async function send(override) {
  if (busy) return;
  const inp = document.getElementById('inp');
  const raw = override || inp.value.trim();
  if (!raw) return;

  let msg = raw;
  if (mode === 'explain') msg = `[EXPLAIN MODE] ${raw}`;
  if (mode === 'quiz')    msg = `[QUIZ MODE] Please quiz me on: ${raw}`;

  if (!override) { inp.value=''; inp.style.height='auto'; }

  addUser(raw);
  busy = true;
  document.getElementById('sbtn').disabled = true;
  showThinking();

  history.push({ role:'user', content:msg });

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: history.slice(0,-1) })
    });

    hideThinking();

    if (!res.ok) { history.pop(); throw new Error(`Server ${res.status}`); }

    const data  = await res.json();
    const reply = data.response||data.message||data.reply||data.content||data.text
                  ||(typeof data==='string'?data:null);

    if (reply) {
      addAI(reply);
      history.push({ role:'assistant', content:reply });
    } else {
      history.pop();
      addError('Unexpected response format.');
    }
  } catch(err) {
    hideThinking(); history.pop();
    addError(err.name==='TypeError'
      ? 'Could not reach the server. Check your connection.'
      : `Something went wrong: ${err.message}`);
  } finally {
    busy = false;
    document.getElementById('sbtn').disabled = false;
    inp.focus();
  }
}

function sendChip(btn) { send(btn.textContent); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
window.addEventListener('load', ()=>document.getElementById('inp').focus());
</script>
</body>
</html>
